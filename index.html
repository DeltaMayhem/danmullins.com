  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Epilogue', sans-serif;

    }

    .photo-stage {
      position: fixed;
      inset: 0;
      background: #1a1917;
    }

    .photo-slide {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      opacity: 0;
      transition: opacity 1.4s ease;
    }

    .photo-slide.active { opacity: 1; }

    .bottom-gradient {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 55%;
      background: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.18) 40%, rgba(0,0,0,0.55) 100%);
      z-index: 2;
      pointer-events: none;
    }

    .content {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 3;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding-bottom: 3.5rem;
      gap: 0.6rem;
    }

    .glass {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 1.1rem;
      padding: 1.5rem 2.5rem 1.6rem;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 0.5px solid rgba(255, 255, 255, 0.18);
    }

    .name {
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-weight: 400;
      font-size: clamp(1.9rem, 4vw, 2.6rem);
      color: #fff;
      letter-spacing: -0.03em;
      line-height: 1.05;
    }

    .links {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .links a {
      font-size: 0.72rem;
      color: rgba(255, 255, 255, 0.75);
      text-decoration: none;
      border-bottom: 0.5px solid rgba(255, 255, 255, 0.3);
      padding-bottom: 2px;
      font-weight: 300;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: color 0.2s, border-color 0.2s;
    }

    .links a:hover {
      color: #fff;
      border-color: rgba(255, 255, 255, 0.75);
    }

    /* ── Bio panel ── */

    .bio-panel {
      padding: 0;
      overflow: hidden;
      cursor: pointer;
      gap: 0;
      transition: background 0.2s;
    }

    .bio-panel:hover {
      background: rgba(255, 255, 255, 0.14);
    }

    .bio-trigger {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.65rem 1.5rem;
      width: 100%;
      justify-content: center;
    }

    .bio-trigger-label {
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.65);
      font-weight: 300;
      font-family: 'Epilogue', sans-serif;
    }

    .bio-arrow {
      font-size: 0.6rem;
      color: rgba(255, 255, 255, 0.45);
      transition: transform 0.3s ease;
      display: inline-block;
    }

    .bio-panel.open .bio-arrow {
      transform: rotate(180deg);
    }

    .bio-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s ease, padding 0.35s ease;
      padding: 0 1.75rem;
    }

    .bio-panel.open .bio-body {
      max-height: 120px;
      padding: 0 1.75rem 1.25rem;
    }

    .bio-text {
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.7);
      font-weight: 300;
      line-height: 1.65;
      letter-spacing: 0.01em;
      font-family: 'Epilogue', sans-serif;
      max-width: 320px;
    }

    /* ── Controls panel ── */

    .ctrl-panel {
      flex-direction: row;
      gap: 0;
      padding: 0;
      overflow: hidden;
    }

    .ctrl {
      background: transparent;
      border: none;
      color: rgba(255, 255, 255, 0.7);
      padding: 0.65rem 1.4rem;
      font-family: 'Epilogue', sans-serif;
      font-size: 0.85rem;
      cursor: pointer;
      font-weight: 300;
      transition: background 0.15s, color 0.15s;
      line-height: 1;
    }

    .ctrl:hover {
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
    }

    .ctrl.pause {
      border-left: 0.5px solid rgba(255, 255, 255, 0.15);
      border-right: 0.5px solid rgba(255, 255, 255, 0.15);
      min-width: 5.5rem;
      font-size: 0.62rem;
      letter-spacing: 0.09em;
      text-transform: uppercase;
    }

    /* ── Dots ── */

      left: 1.5rem;

    .dot {

    /* ── Progress bar ── */

      bottom: 0;

<body>

  <div class="photo-stage" id="stage" role="img" aria-label="Photography by Dan Mullins, including surf and snowboard imagery">
    <div class="photo-slide active" style="background-image: url('images/photo-1.jpg');" role="img" aria-label="Surf or snowboard photography by Dan Mullins"></div>
    <div class="photo-slide"        style="background-image: url('images/photo-2.jpg');" role="img" aria-label="Surf or snowboard photography by Dan Mullins"></div>

    <div class="photo-slide"        style="background-image: url('images/photo-4.jpg');" role="img" aria-label="Surf or snowboard photography by Dan Mullins"></div>
    <div class="photo-slide"        style="background-image: url('images/photo-5.jpg');" role="img" aria-label="Surf or snowboard photography by Dan Mullins"></div>
  </div>

  <div class="bottom-gradient"></div>

  <div class="content">

    <div class="glass">
      <h1 class="name">Dan Mullins</h1>
      <nav class="links" aria-label="Social links">
        <a href="https://www.instagram.com/danmullins/"               target="_blank" rel="noopener noreferrer">Instagram</a>
        <a href="https://www.linkedin.com/in/dan-mullins-56b86b225/"  target="_blank" rel="noopener noreferrer">LinkedIn</a>
        <a href="https://www.thewave.com"                             target="_blank" rel="noopener noreferrer">The Wave</a>
        <a href="mailto:finbar007@gmail.com">Email</a>
      </nav>
    </div>

    <div class="glass bio-panel" id="bio-panel" onclick="toggleBio()">
      <div class="bio-trigger">
        <span class="bio-trigger-label">About</span>
        <span class="bio-arrow">&#9650;</span>
      </div>
      <div class="bio-body">
        <p class="bio-text">Professional photographer, videographer and ISA Level 2 surf coach. Head coach at The Wave Bristol. Work published across leading surf and snowboard titles worldwide. Available for shoots, coaching and collaborations.</p>
      </div>
    </div>

    <div class="glass ctrl-panel">
      <button class="ctrl" onclick="prev()" aria-label="Previous photo">&#8592;</button>
      <button class="ctrl pause" id="pause-btn" onclick="togglePause()">Pause</button>
      <button class="ctrl" onclick="skip()" aria-label="Next photo">&#8594;</button>
    </div>

  </div>

  <div class="dots" id="dots"></div>

  <div class="progress-track">
    <div class="progress-fill" id="progress"></div>
  </div>

<script>
  const slides   = document.querySelectorAll('.photo-slide');
  const dotsWrap = document.getElementById('dots');
  const progress = document.getElementById('progress');
  const pauseBtn = document.getElementById('pause-btn');

  const DURATION = 10000;
  let current = 0, paused = false, startTime = null, raf = null;

  slides.forEach(function(_, i) {
    var d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    dotsWrap.appendChild(d);
  });
  var dots = document.querySelectorAll('.dot');

  function goTo(idx) {
    slides[current].classList.remove('active');
    dots[current].classList.remove('active');
    current = (idx + slides.length) % slides.length;
    slides[current].classList.add('active');
    dots[current].classList.add('active');
  }

  function tick(ts) {
    if (!startTime) startTime = ts;
    var elapsed = ts - startTime;
    progress.style.width = Math.min((elapsed / DURATION) * 100, 100) + '%';
    if (elapsed >= DURATION) {
      goTo(current + 1);
      startTime = ts;
      progress.style.width = '0%';
    }
    if (!paused) raf = requestAnimationFrame(tick);
  }

  function prev() {
    cancelAnimationFrame(raf);
    goTo(current - 1);
    startTime = null;
    progress.style.width = '0%';
    if (!paused) raf = requestAnimationFrame(tick);
  }

  function skip() {
    cancelAnimationFrame(raf);
    goTo(current + 1);
    startTime = null;
    progress.style.width = '0%';
    if (!paused) raf = requestAnimationFrame(tick);
  }

  function togglePause() {
    paused = !paused;
    pauseBtn.textContent = paused ? 'Play' : 'Pause';
    if (!paused) {
      startTime = null;
      progress.style.width = '0%';
      raf = requestAnimationFrame(tick);
    } else {
      cancelAnimationFrame(raf);
    }
  }

  function toggleBio() {
    document.getElementById('bio-panel').classList.toggle('open');
  }

  raf = requestAnimationFrame(tick);
</script>
